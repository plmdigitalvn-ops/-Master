            { id: 94, hanzi: '宏观', pinyin: 'hóngguān', meaning: 'Vĩ mô', topic: 'HSK 6' },
            { id: 95, hanzi: '微妙', pinyin: 'wēimiào', meaning: 'Tinh tế, vi diệu', topic: 'HSK 6' },
            { id: 96, hanzi: '渊博', pinyin: 'yuānbó', meaning: 'Uyên bác', topic: 'HSK 6' },
            { id: 97, hanzi: '阐述', pinyin: 'chǎnshù', meaning: 'Trình bày, giải thích', topic: 'HSK 6' },
            { id: 98, hanzi: '兑现', pinyin: 'duìxiàn', meaning: 'Thực hiện lời hứa', topic: 'HSK 6' },
            { id: 99, hanzi: '诞生', pinyin: 'dànshēng', meaning: 'Ra đời', topic: 'HSK 6' },
            { id: 100, hanzi: '辉煌', pinyin: 'huīhuáng', meaning: 'Huy hoàng', topic: 'HSK 6' }
        ];

        let words = JSON.parse(localStorage.getItem('thuy_dung_master_v100')) || masterVocab;
        let currentFilter = 'All';
        let currentCardIndex = 0;

        // KHỞI TẠO ÂM THANH
        function unlockAudio() {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance('你好');
            s.lang = 'zh-CN';
            s.volume = 0; // Đọc thầm để đánh thức engine
            window.speechSynthesis.speak(s);
            
            document.getElementById('audio-unlocker').classList.add('opacity-0');
            setTimeout(() => document.getElementById('audio-unlocker').remove(), 300);
            
            renderLibrary();
            lucide.createIcons();
        }

        function speak(text) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            setTimeout(() => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN';
                u.rate = 0.8;
                const vs = window.speechSynthesis.getVoices();
                const v = vs.find(x => x.lang.includes('zh-CN') || x.lang.includes('zh_CN'));
                if (v) u.voice = v;
                window.speechSynthesis.speak(u);
            }, 50);
        }

        function switchTab(tab) {
            ['library', 'flashcard', 'add'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).className = "flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-white";
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).className = "flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all bg-white text-gray-900 shadow-xl";
            
            if (tab === 'flashcard') {
                currentCardIndex = 0;
                renderFlashcard();
            }
            lucide.createIcons();
        }

        function setFilter(val) {
            currentFilter = val;
            document.querySelectorAll('.filter-btn').forEach(b => {
                if (b.getAttribute('data-val') === val) {
                    b.className = "filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-red-500 text-white border-red-500 shadow-lg shadow-red-100";
                } else {
                    b.className = "filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-white text-gray-400 border-gray-100";
                }
            });
            renderLibrary();
        }

        function renderLibrary() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('words-list');
            const filtered = words.filter(w => 
                (currentFilter === 'All' || w.topic === currentFilter) &&
                (w.hanzi.toLowerCase().includes(search) || w.meaning.toLowerCase().includes(search))
            );

            if (filtered.length === 0) {
                list.innerHTML = `<div class="p-10 bg-white rounded-[2.5rem] border border-dashed border-gray-200 text-center font-bold text-gray-300 uppercase tracking-widest text-xs">Trống trải...</div>`;
            } else {
                list.innerHTML = filtered.map(w => `
                    <div class="bg-white p-7 rounded-[2.5rem] shadow-xl shadow-gray-200/40 border border-white flex items-center justify-between group animate-pop">
                        <div class="flex-1 min-w-0 pr-4">
                            <span class="inline-block px-2.5 py-1 bg-red-50 text-red-500 text-[8px] font-black rounded-lg uppercase mb-3 tracking-wider">${w.topic}</span>
                            <h3 class="text-3xl font-black text-gray-900 tracking-tight mb-1 truncate">${w.hanzi}</h3>
                            <p class="text-red-500 text-sm font-bold italic mb-1">${w.pinyin}</p>
                            <p class="text-gray-500 text-sm font-medium line-clamp-1">${w.meaning}</p>
                        </div>
                        <button onclick="speak('${w.hanzi}')" class="w-16 h-16 bg-gray-50 text-gray-400 rounded-[1.5rem] flex items-center justify-center btn-active hover:bg-red-50 hover:text-red-500 transition-all ring-1 ring-gray-100">
                            <i data-lucide="volume-2" class="w-7 h-7"></i>
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function renderFlashcard() {
            const data = words.filter(w => currentFilter === 'All' || w.topic === currentFilter);
            const container = document.getElementById('flashcard-container');
            if (data.length === 0) {
                container.innerHTML = `<p class="font-bold text-gray-300 uppercase py-20">Hãy thêm từ trước!</p>`;
                return;
            }
            const w = data[currentCardIndex];
            container.innerHTML = `
                <div class="relative w-full max-w-[320px] h-[450px] cursor-pointer no-print" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                    <div class="card-inner w-full h-full relative">
                        <div class="card-front bg-white rounded-[3.5rem] shadow-2xl border border-white flex flex-col items-center justify-center p-10 text-center ring-1 ring-black/5">
                            <span class="absolute top-10 px-5 py-1.5 bg-red-500 text-white text-[9px] font-black rounded-full tracking-widest shadow-lg">${w.topic}</span>
                            <h2 class="text-8xl font-black text-gray-900 mb-8">${w.hanzi}</h2>
                            <div class="flex items-center gap-2 text-gray-300 font-black text-[9px] uppercase tracking-[0.3em]">
                                <i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> Chạm để lật
                            </div>
                        </div>
                        <div class="card-back bg-gray-900 rounded-[3.5rem] shadow-2xl flex flex-col items-center justify-center p-12 text-center text-white ring-1 ring-white/20">
                            <p class="text-xl font-bold mb-3 text-red-500 italic uppercase tracking-widest">${w.pinyin}</p>
                            <h3 class="text-4xl font-black mb-10 leading-tight">${w.meaning}</h3>
                            <button onclick="event.stopPropagation(); speak('${w.hanzi}')" class="w-20 h-20 bg-white text-gray-900 rounded-full flex items-center justify-center shadow-2xl btn-active">
                                <i data-lucide="volume-2" class="w-10 h-10"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-10 no-print">
                    <button onclick="prevCard()" class="p-6 bg-white rounded-3xl shadow-xl text-gray-400 btn-active border border-gray-100">
                        <i data-lucide="chevron-left" class="w-8 h-8"></i>
                    </button>
                    <span class="text-sm font-black text-gray-300 tracking-[0.2em] uppercase">${currentCardIndex + 1} / ${data.length}</span>
                    <button onclick="nextCard()" class="p-6 bg-white rounded-3xl shadow-xl text-gray-400 btn-active border border-gray-100">
                        <i data-lucide="chevron-right" class="w-8 h-8"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function nextCard() {
            const data = words.filter(w => currentFilter === 'All' || w.topic === currentFilter);
            if (currentCardIndex < data.length - 1) { currentCardIndex++; renderFlashcard(); }
        }
        function prevCard() {
            if (currentCardIndex > 0) { currentCardIndex--; renderFlashcard(); }
        }

        async function translateWord() {
            const h = document.getElementById('input-hanzi').value;
            if (!h) return;
            try {
                const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(h)}&langpair=zh-CN|vi`);
                const d = await r.json();
                document.getElementById('input-meaning').value = d.responseData.translatedText;
            } catch (e) { alert("Dịch thuật thất bại."); }
        }

        function addWord() {
            const h = document.getElementById('input-hanzi').value;
            const p = document.getElementById('input-pinyin').value;
            const m = document.getElementById('input-meaning').value;
            const t = document.getElementById('input-topic').value;
            if (!h || !m) return;
            words.unshift({ id: Date.now(), hanzi: h, pinyin: p, meaning: m, topic: t });
            localStorage.setItem('thuy_dung_master_v100', JSON.stringify(words));
            document.getElementById('input-hanzi').value = '';
            document.getElementById('input-pinyin').value = '';
            document.getElementById('input-meaning').value = '';
            switchTab('library');
            renderLibrary();
        }

        function exportData() {
            const b = new Blob([JSON.stringify(words)], {type: 'application/json'});
            const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = 'thuydung-vocab.json'; a.click();
        }

        function importData(e) {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = (x) => {
                const d = JSON.parse(x.target.result);
                words = [...d, ...words];
                localStorage.setItem('thuy_dung_master_v100', JSON.stringify(words));
                renderLibrary();
                alert('Đã cập nhật dữ liệu!');
            };
            r.readAsText(f);
        }

        window.onload = () => {
            lucide.createIcons();
            // Tải danh sách voices sẵn
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
