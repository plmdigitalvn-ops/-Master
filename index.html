<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>垂容 MASTER - AI 掃描</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
        .card-back { transform: rotateY(180deg); }
        @media print { .no-print { display: none !important; } }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pop { animation: fadeIn 0.3s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 no-print">
        <div class="max-w-xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-gray-900 tracking-tighter uppercase">垂容 MASTER</h1>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold">AI VERSION</span>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.1em] leading-none">智能掃描 Smart Scan</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.print()" class="p-3 text-gray-400 hover:bg-gray-100 rounded-2xl btn-active transition-all">
                    <i data-lucide="printer" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto p-6">
        
        <!-- Search & Filter (Library) -->
        <section id="view-library" class="space-y-6">
            <div class="space-y-4 no-print">
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-red-500 transition-colors"></i>
                    <input type="text" id="search-input" oninput="renderLibrary()" placeholder="Tìm kiếm từ vựng... 搜索" class="w-full pl-14 pr-6 py-5 bg-white rounded-[2rem] border-none shadow-xl shadow-gray-200/50 ring-1 ring-gray-100 focus:ring-2 focus:ring-red-500 transition-all outline-none text-base font-medium">
                </div>
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button onclick="setFilter('All')" class="filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-red-500 text-white border-red-500 shadow-lg shadow-red-100" data-val="All">全部 ALL</button>
                    <button onclick="setFilter('HSK 1')" class="filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-white text-gray-400 border-gray-100" data-val="HSK 1">HSK 1</button>
                    <button onclick="setFilter('HSK 2')" class="filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-white text-gray-400 border-gray-100" data-val="HSK 2">HSK 2</button>
                    <button onclick="setFilter('HSK 3')" class="filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-white text-gray-400 border-gray-100" data-val="HSK 3">HSK 3</button>
                    <button onclick="setFilter('HSK 4')" class="filter-btn px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap transition-all border bg-white text-gray-400 border-gray-100" data-val="HSK 4">HSK 4</button>
                </div>
            </div>

            <div id="words-list" class="grid grid-cols-1 gap-5"></div>
        </section>

        <!-- AI Scan View -->
        <section id="view-scan" class="hidden space-y-6">
            <div class="bg-white rounded-[3rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-100">
                <h2 class="text-xl font-black text-gray-900 mb-2">Quét thông minh / 智能掃描</h2>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer bg-red-50 border-2 border-dashed border-red-200 rounded-[2.5rem] p-8 flex flex-col items-center gap-3 hover:bg-red-100 transition-all btn-active group">
                        <input type="file" id="scan-image" accept="image/*" class="hidden" onchange="handleOCR(this)">
                        <div class="w-14 h-14 bg-red-600 text-white rounded-2xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform">
                            <i data-lucide="camera" class="w-6 h-6"></i>
                        </div>
                        <span class="text-[10px] font-black text-red-600 uppercase tracking-widest">Quét Ảnh</span>
                    </label>
                    <label class="cursor-pointer bg-blue-50 border-2 border-dashed border-blue-200 rounded-[2.5rem] p-8 flex flex-col items-center gap-3 hover:bg-blue-100 transition-all btn-active group">
                        <input type="file" id="scan-pdf" accept="application/pdf" class="hidden" onchange="handlePDF(this)">
                        <div class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg group-hover:-rotate-6 transition-transform">
                            <i data-lucide="file-text" class="w-6 h-6"></i>
                        </div>
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Đọc PDF</span>
                    </label>
                </div>
                <div id="ai-loading" class="hidden mt-8 text-center space-y-4 animate-pop">
                    <div class="w-full h-24 loading-shimmer rounded-[2rem]"></div>
                </div>
                <div id="scan-results" class="hidden mt-8 space-y-4">
                    <div id="results-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2 no-scrollbar"></div>
                </div>
            </div>
        </section>

        <!-- Flashcard View (FIXED) -->
        <section id="view-flashcard" class="hidden py-6">
            <div id="flashcard-container" class="flex flex-col items-center gap-10">
                <!-- Static structure for smoother navigation -->
                <div id="main-flashcard" class="relative w-full max-w-[320px] h-[450px] cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                    <div class="card-inner w-full h-full relative">
                        <div class="card-front bg-white rounded-[3.5rem] shadow-2xl flex flex-col items-center justify-center p-10 text-center border-4 border-red-50 ring-1 ring-black/5">
                            <h2 id="fc-hanzi" class="text-8xl font-black text-gray-900 mb-8">...</h2>
                            <p class="text-gray-300 font-black text-[9px] uppercase tracking-widest italic">Chạm để xem nghĩa</p>
                        </div>
                        <div class="card-back bg-gray-900 rounded-[3.5rem] shadow-2xl flex flex-col items-center justify-center p-12 text-center text-white">
                            <p id="fc-pinyin" class="text-xl font-bold mb-3 text-red-500 italic uppercase">...</p>
                            <h3 id="fc-meaning" class="text-4xl font-black mb-10 leading-tight">...</h3>
                            <button onclick="event.stopPropagation(); speakFlashcard()" class="w-20 h-20 bg-white text-gray-900 rounded-full flex items-center justify-center shadow-2xl btn-active">
                                <i data-lucide="volume-2" class="w-10 h-10 text-gray-900"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-10">
                    <button onclick="prevCard()" class="p-6 bg-white rounded-3xl shadow-xl text-gray-400 btn-active hover:text-red-500 transition-colors">
                        <i data-lucide="chevron-left" class="w-8 h-8"></i>
                    </button>
                    <span id="fc-counter" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">0 / 0</span>
                    <button onclick="nextCard()" class="p-6 bg-white rounded-3xl shadow-xl text-gray-400 btn-active hover:text-red-500 transition-colors">
                        <i data-lucide="chevron-right" class="w-8 h-8"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Add Manual Word -->
        <section id="view-add" class="hidden space-y-6">
            <div class="bg-white rounded-[3rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-100 space-y-6">
                <h2 class="text-lg font-black text-gray-900 tracking-tight flex items-center gap-2 uppercase">
                    <i data-lucide="plus-square" class="text-red-500"></i> Thêm từ mới / 添加
                </h2>
                <div class="space-y-4">
                    <input type="text" id="input-hanzi" onchange="autoTranslate()" placeholder="Hán tự (汉字)..." class="w-full p-5 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none font-bold text-lg">
                    <input type="text" id="input-pinyin" placeholder="Pinyin (拼音)..." class="w-full p-5 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none">
                    <input type="text" id="input-meaning" placeholder="Nghĩa (释义)..." class="w-full p-5 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none">
                    <select id="input-topic" class="w-full p-5 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none font-black text-gray-600">
                        <option value="HSK 1">HSK 1</option>
                        <option value="HSK 2">HSK 2</option>
                        <option value="HSK 3">HSK 3</option>
                        <option value="HSK 4">HSK 4</option>
                        <option value="HSK 5">HSK 5</option>
                    </select>
                </div>
                <button onclick="addWordManually()" class="w-full py-6 bg-red-600 text-white rounded-[2rem] font-black shadow-xl btn-active text-[11px] tracking-widest uppercase">
                    Lưu từ vựng / 保存
                </button>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-8 left-6 right-6 z-50 no-print">
        <div class="max-w-md mx-auto bg-gray-900/90 backdrop-blur-2xl p-3 rounded-[2.5rem] shadow-2xl flex items-center gap-2 ring-1 ring-white/10">
            <button onclick="switchTab('library')" id="nav-library" class="flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all bg-white text-gray-900 shadow-xl">
                <i data-lucide="book-marked" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Từ điển</span>
            </button>
            <button onclick="switchTab('scan')" id="nav-scan" class="flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-white">
                <i data-lucide="scan-text" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Quét</span>
            </button>
            <button onclick="switchTab('flashcard')" id="nav-flashcard" class="flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-white">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Học tập</span>
            </button>
            <button onclick="switchTab('add')" id="nav-add" class="flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-white">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-widest">Thêm</span>
            </button>
        </div>
    </nav>

            const all = [];
            hsk1.forEach((x, i) => all.push({id: `1-${i}`, hanzi: x.h, pinyin: x.p, meaning: x.m, topic: 'HSK 1', createdAt: Date.now() - i*1000}));
            hsk2.forEach((x, i) => all.push({id: `2-${i}`, hanzi: x.h, pinyin: x.p, meaning: x.m, topic: 'HSK 2', createdAt: Date.now() - i*1000}));
            hsk3.forEach((x, i) => all.push({id: `3-${i}`, hanzi: x.h, pinyin: x.p, meaning: x.m, topic: 'HSK 3', createdAt: Date.now() - i*1000}));
            return all;
        };

        let words = JSON.parse(localStorage.getItem('thuy_dung_vocab')) || generateHSKData();
        let currentFilter = 'All';
        let currentCardIndex = 0;
        let filteredFlashcards = [];

        window.onload = () => {
            lucide.createIcons();
            renderLibrary();
        };

        function saveToLocal() { localStorage.setItem('thuy_dung_vocab', JSON.stringify(words)); }

        // NAVIGATION
        function switchTab(tab) {
            ['library', 'scan', 'flashcard', 'add'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).className = "flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all text-gray-400 hover:text-white";
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).className = "flex-1 py-4 rounded-[2rem] flex flex-col items-center gap-1.5 transition-all bg-white text-gray-900 shadow-xl";
            
            if (tab === 'flashcard') { 
                currentCardIndex = 0; 
                initFlashcardList();
                updateFlashcardUI(); 
            }
            lucide.createIcons();
        }

        // FLASHCARD LOGIC (FIXED NAVIGATION)
        function initFlashcardList() {
            filteredFlashcards = words.filter(w => currentFilter === 'All' || w.topic === currentFilter);
        }

        function updateFlashcardUI() {
            const container = document.getElementById('flashcard-container');
            const mainCard = document.getElementById('main-flashcard');
            
            if (!filteredFlashcards.length) {
                mainCard.classList.add('hidden');
                document.getElementById('fc-counter').innerText = "0 / 0";
                return;
            }

            mainCard.classList.remove('hidden');
            const w = filteredFlashcards[currentCardIndex];
            
            // Reset lật thẻ khi qua từ mới
            mainCard.querySelector('.card-inner').classList.remove('is-flipped');
            
            // Cập nhật nội dung mượt mà
            document.getElementById('fc-hanzi').innerText = w.hanzi;
            document.getElementById('fc-pinyin').innerText = w.pinyin;
            document.getElementById('fc-meaning').innerText = w.meaning;
            document.getElementById('fc-counter').innerText = `${currentCardIndex + 1} / ${filteredFlashcards.length}`;
            
            lucide.createIcons();
        }

        function nextCard() {
            if (currentCardIndex < filteredFlashcards.length - 1) {
                currentCardIndex++;
                updateFlashcardUI();
            } else {
                // Quay lại đầu danh sách nếu hết
                currentCardIndex = 0;
                updateFlashcardUI();
            }
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                updateFlashcardUI();
            } else {
                // Quay lại cuối danh sách
                currentCardIndex = filteredFlashcards.length - 1;
                updateFlashcardUI();
            }
        }

        function speakFlashcard() {
            const word = filteredFlashcards[currentCardIndex];
            if (word) speak(word.hanzi);
        }

        // CORE UI & LIBRARY
        function renderLibrary() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('words-list');
            const filtered = words.filter(w => 
                (currentFilter === 'All' || w.topic === currentFilter) &&
                (w.hanzi.toLowerCase().includes(search) || w.meaning.toLowerCase().includes(search))
            ).sort((a, b) => b.createdAt - a.createdAt);

            list.innerHTML = filtered.map(w => `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white flex items-center justify-between animate-pop">
                    <div class="flex-1 pr-4">
                        <span class="text-[8px] bg-red-50 text-red-600 px-2 py-0.5 rounded font-black uppercase mb-1 inline-block">${w.topic}</span>
                        <h3 class="text-3xl font-black text-gray-900 mb-0.5">${w.hanzi}</h3>
                        <p class="text-red-500 text-[11px] font-bold italic mb-1 uppercase">${w.pinyin}</p>
                        <p class="text-gray-500 text-xs font-semibold">${w.meaning}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="speak('${w.hanzi}')" class="w-12 h-12 bg-gray-50 text-gray-400 rounded-2xl flex items-center justify-center btn-active">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const isActive = b.getAttribute('data-val') === f;
                b.className = isActive ? "filter-btn px-6 py-3 rounded-2xl text-[11px] font-black border bg-red-500 text-white border-red-500" : "filter-btn px-6 py-3 rounded-2xl text-[11px] font-black border bg-white text-gray-400 border-gray-100";
            });
            renderLibrary();
        }

        // SPEECH
        function speak(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'zh-CN';
            ut.rate = 0.8;
            window.speechSynthesis.speak(ut);
        }

        // MOCK OCR & ADD (Giữ nguyên cấu trúc cũ)
        function addWordManually() {
            const h = document.getElementById('input-hanzi').value;
            const m = document.getElementById('input-meaning').value;
            if(!h || !m) return;
            words.push({id: Date.now(), hanzi: h, pinyin: document.getElementById('input-pinyin').value, meaning: m, topic: document.getElementById('input-topic').value, createdAt: Date.now()});
            saveToLocal();
            switchTab('library');
        }

        async function autoTranslate() {
            const h = document.getElementById('input-hanzi').value;
            if(!h) return;
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({contents: [{parts: [{text: `Translate to VN and Pinyin. JSON only: {"pinyin": "...", "meaning": "..."}. Word: ${h}`}]}], generationConfig: {responseMimeType: "application/json"}})
                });
                const d = await r.json();
                const res = JSON.parse(d.candidates[0].content.parts[0].text);
                document.getElementById('input-pinyin').value = res.pinyin;
                document.getElementById('input-meaning').value = res.meaning;
            } catch(e){}
        }
    </script>
</body>
</html>
