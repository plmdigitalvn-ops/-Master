<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>垂容 MASTER - HSK Vocabulary Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
        .card-back { transform: rotateY(180deg); }
        @media print { .no-print { display: none !important; } }
        .speak-btn:active { transform: scale(0.9); background-color: #fee2e2; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="pb-20 md:pb-0 custom-scrollbar">

    <header class="bg-white border-b sticky top-0 z-50 no-print">
        <div class="max-w-4xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="brain-circuit"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900 uppercase">垂容 MASTER</h1>
                    <p class="text-[10px] text-red-500 font-bold tracking-widest leading-none">HSK 1-6 MEGA VOCABULARY</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.print()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors">
                    <i data-lucide="printer" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <nav class="flex gap-1 bg-white p-1 rounded-2xl shadow-sm border mb-6 no-print">
            <button onclick="switchTab('library')" id="tab-library" class="flex-1 py-3 px-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Thư viện
            </button>
            <button onclick="switchTab('flashcard')" id="tab-flashcard" class="flex-1 py-3 px-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <i data-lucide="zap" class="w-4 h-4"></i> Ôn tập
            </button>
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-3 px-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> Thêm từ
            </button>
        </nav>

        <section id="view-library" class="space-y-6">
            <div class="flex flex-col gap-4 no-print">
                <select id="filter-topic" onchange="renderLibrary()" class="w-full p-4 bg-white rounded-2xl border-none shadow-sm ring-1 ring-gray-200 text-sm font-semibold focus:ring-2 focus:ring-red-500 outline-none">
                    <option value="All">Tất cả cấp độ (HSK 1-6)</option>
                    <option value="HSK 1">HSK 1 - Cơ bản</option>
                    <option value="HSK 2">HSK 2 - Sơ cấp</option>
                    <option value="HSK 3">HSK 3 - Trung cấp</option>
                    <option value="HSK 4">HSK 4 - Khá</option>
                    <option value="HSK 5">HSK 5 - Cao cấp</option>
                    <option value="HSK 6">HSK 6 - Chuyên gia</option>
                </select>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" id="search-input" oninput="renderLibrary()" placeholder="Tìm Hán tự, Pinyin hoặc ý nghĩa..." class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border-none shadow-sm ring-1 ring-gray-200 text-sm focus:ring-2 focus:ring-red-500 outline-none">
                </div>
            </div>

            <div id="words-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Words injected here -->
            </div>
        </section>

        <section id="view-flashcard" class="hidden py-10">
            <div id="flashcard-container" class="flex flex-col items-center gap-8">
                <div class="relative w-72 h-[420px] cursor-pointer" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                    <div class="card-inner w-full h-full relative">
                        <div class="card-front bg-white rounded-[2rem] shadow-xl border flex flex-col items-center justify-center p-6 text-center">
                            <span id="fc-topic" class="absolute top-6 px-3 py-1 bg-red-100 text-red-600 text-[10px] font-bold rounded-full uppercase tracking-widest"></span>
                            <h2 id="fc-hanzi" class="text-7xl font-bold text-gray-800 mb-4"></h2>
                            <p class="text-gray-400 text-xs">Chạm để lật thẻ</p>
                        </div>
                        <div class="card-back bg-red-500 rounded-[2rem] shadow-xl flex flex-col items-center justify-center p-8 text-center text-white">
                            <p id="fc-pinyin" class="text-xl font-medium mb-2 opacity-90"></p>
                            <h3 id="fc-meaning" class="text-3xl font-bold mb-6"></h3>
                            <button onclick="event.stopPropagation(); handleSpeakFromFlashcard()" class="w-14 h-14 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center transition-all">
                                <i data-lucide="volume-2" class="w-6 h-6 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-6 no-print">
                    <button onclick="prevCard()" class="p-4 bg-white rounded-full shadow-md hover:bg-gray-50 transition-all active:scale-95 border">
                        <i data-lucide="chevron-left" class="w-6 h-6 text-gray-600"></i>
                    </button>
                    <span id="fc-counter" class="text-sm font-bold text-gray-400 bg-gray-100 px-4 py-2 rounded-full uppercase tracking-widest"></span>
                    <button onclick="nextCard()" class="p-4 bg-white rounded-full shadow-md hover:bg-gray-50 transition-all active:scale-95 border">
                        <i data-lucide="chevron-right" class="w-6 h-6 text-gray-600"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-add" class="hidden">
            <div class="bg-white rounded-[2rem] shadow-sm border p-6 md:p-8 space-y-6">
                <div class="space-y-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest">Thông tin từ mới</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <input type="text" id="input-hanzi" placeholder="Hán tự (VD: 老师)" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-red-500 outline-none">
                            <button onclick="translateWord()" class="absolute right-2 top-2 px-3 py-2 bg-red-500 text-white rounded-xl text-xs font-bold shadow-sm active:scale-95">DỊCH</button>
                        </div>
                        <input type="text" id="input-pinyin" placeholder="Pinyin (VD: lǎoshī)" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-red-500 outline-none">
                        <input type="text" id="input-meaning" placeholder="Nghĩa tiếng Việt" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-red-500 outline-none">
                        <select id="input-topic" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-red-500 outline-none">
                            <option value="HSK 1">HSK 1</option>
                            <option value="HSK 2">HSK 2</option>
                            <option value="HSK 3">HSK 3</option>
                            <option value="HSK 4">HSK 4</option>
                            <option value="HSK 5">HSK 5</option>
                            <option value="HSK 6">HSK 6</option>
                        </select>
                    </div>
                </div>
                <button onclick="addWord()" class="w-full py-5 bg-red-500 text-white rounded-2xl font-bold shadow-lg shadow-red-200 hover:bg-red-600 transition-all active:scale-[0.98]">
                    THÊM VÀO THƯ VIỆN
                </button>

                <div class="pt-6 border-t border-dashed">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Dữ liệu hiện tại</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="exportData()" class="p-4 bg-gray-50 text-gray-600 rounded-2xl text-xs font-bold border flex flex-col items-center gap-2">
                            <i data-lucide="download" class="w-5 h-5"></i> SAO LƯU JSON
                        </button>
                        <label class="p-4 bg-gray-50 text-gray-600 rounded-2xl text-xs font-bold border flex flex-col items-center gap-2 cursor-pointer">
                            <i data-lucide="upload" class="w-5 h-5"></i> NHẬP DỮ LIỆU
                            <input type="file" onchange="importData(event)" class="hidden">
                        </label>
                    </div>
                    <button onclick="resetToDefault()" class="w-full mt-3 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100 flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> KHÔI PHỤC KHO TỪ MẶC ĐỊNH
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const DEFAULT_LIBRARY = [

            { hanzi: "我", pinyin: "wǒ", meaning: "Tôi", topic: "HSK 1" },
            { hanzi: "你", pinyin: "nǐ", meaning: "Bạn", topic: "HSK 1" },

            { hanzi: "我们", pinyin: "wǒmen", meaning: "Chúng tôi", topic: "HSK 1" },

            { hanzi: "朋友", pinyin: "péngyou", meaning: "Bạn bè", topic: "HSK 1" },
            { hanzi: "医生", pinyin: "yīshēng", meaning: "Bác sĩ", topic: "HSK 1" },
            { hanzi: "医院", pinyin: "yīyuàn", meaning: "Bệnh viện", topic: "HSK 1" },
            { hanzi: "学校", pinyin: "xuéxiào", meaning: "Trường học", topic: "HSK 1" },
            { hanzi: "书", pinyin: "shū", meaning: "Sách", topic: "HSK 1" },
            { hanzi: "看", pinyin: "kàn", meaning: "Xem, nhìn", topic: "HSK 1" },
            { hanzi: "听", pinyin: "tīng", meaning: "Nghe", topic: "HSK 1" },
            { hanzi: "说", pinyin: "shuō", meaning: "Nói", topic: "HSK 1" },
            { hanzi: "读", pinyin: "dú", meaning: "Đọc", topic: "HSK 1" },
            { hanzi: "写", pinyin: "xiě", meaning: "Viết", topic: "HSK 1" },
            { hanzi: "喝", pinyin: "hē", meaning: "Uống", topic: "HSK 1" },
            { hanzi: "吃", pinyin: "chī", meaning: "Ăn", topic: "HSK 1" },
            { hanzi: "米饭", pinyin: "mǐfàn", meaning: "Cơm", topic: "HSK 1" },
            { hanzi: "苹果", pinyin: "píngguǒ", meaning: "Táo", topic: "HSK 1" },
            { hanzi: "水", pinyin: "shuǐ", meaning: "Nước", topic: "HSK 1" },
            { hanzi: "茶", pinyin: "chá", meaning: "Trà", topic: "HSK 1" },
            { hanzi: "爸爸", pinyin: "bàba", meaning: "Bố", topic: "HSK 1" },
            { hanzi: "妈妈", pinyin: "māma", meaning: "Mẹ", topic: "HSK 1" },
            { hanzi: "儿子", pinyin: "érzi", meaning: "Con trai", topic: "HSK 1" },

            { hanzi: "好", pinyin: "hǎo", meaning: "Tốt, ngon", topic: "HSK 1" },
            { hanzi: "冷", pinyin: "lěng", meaning: "Lạnh", topic: "HSK 1" },

            // HSK 2 (Tóm tắt các từ quan trọng)
            { hanzi: "唱歌", pinyin: "chànggē", meaning: "Hát", topic: "HSK 2" },
            { hanzi: "跳舞", pinyin: "tiàowǔ", meaning: "Nhảy múa", topic: "HSK 2" },
            { hanzi: "跑步", pinyin: "pǎobù", meaning: "Chạy bộ", topic: "HSK 2" },
            { hanzi: "运动", pinyin: "yùndòng", meaning: "Vận động", topic: "HSK 2" },
            { hanzi: "旅游", pinyin: "lǚyóu", meaning: "Du lịch", topic: "HSK 2" },
            { hanzi: "路", pinyin: "lù", meaning: "Đường", topic: "HSK 2" },
            { hanzi: "公共汽车", pinyin: "gōnggòngqìchē", meaning: "Xe buýt", topic: "HSK 2" },
            { hanzi: "便宜", pinyin: "piányi", meaning: "Rẻ", topic: "HSK 2" },

            // ... thêm tiếp cho đến 40 từ HSK 2 ...

            { hanzi: "生日", pinyin: "shēngrì", meaning: "Sinh nhật", topic: "HSK 2" },
            { hanzi: "告诉", pinyin: "gàosu", meaning: "Báo cho biết", topic: "HSK 2" },
            { hanzi: "帮助", pinyin: "bāngzhù", meaning: "Giúp đỡ", topic: "HSK 2" },
            { hanzi: "已经", pinyin: "yǐjīng", meaning: "Đã", topic: "HSK 2" },
            { hanzi: "所以", pinyin: "suǒyǐ", meaning: "Cho nên", topic: "HSK 2" },
            { hanzi: "因为", pinyin: "yīnwèi", meaning: "Vì", topic: "HSK 2" },
            { hanzi: "非常", pinyin: "fēicháng", meaning: "Vô cùng", topic: "HSK 2" },

            // HSK 3

            { hanzi: "锻炼", pinyin: "duànliàn", meaning: "Luyện tập", topic: "HSK 3" },
            { hanzi: "关系", pinyin: "guānxì", meaning: "Quan hệ", topic: "HSK 3" },
            { hanzi: "虽然", pinyin: "suīrán", meaning: "Tuy rằng", topic: "HSK 3" },
            { hanzi: "愿意", pinyin: "yuànyì", meaning: "Bằng lòng", topic: "HSK 3" },
            { hanzi: "担心", pinyin: "dānxīn", meaning: "Lo lắng", topic: "HSK 3" },
            { hanzi: "认真", pinyin: "rènzhēn", meaning: "Nghiêm túc", topic: "HSK 3" },

            // HSK 4
            { hanzi: "激动", pinyin: "jīdòng", meaning: "Kích động", topic: "HSK 4" },
            { hanzi: "幽默", pinyin: "yōumò", meaning: "Hài hước", topic: "HSK 4" },
            { hanzi: "考虑", pinyin: "kǎolǜ", meaning: "Suy xét", topic: "HSK 4" },
            { hanzi: "放弃", pinyin: "fàngqì", meaning: "Từ bỏ", topic: "HSK 4" },
            { hanzi: "普遍", pinyin: "pǔbiàn", meaning: "Phổ biến", topic: "HSK 4" },
            { hanzi: "招聘", pinyin: "zhāopìn", meaning: "Tuyển dụng", topic: "HSK 4" },
            { hanzi: "积累", pinyin: "jīlěi", meaning: "Tích lũy", topic: "HSK 4" },
            { hanzi: "关键", pinyin: "guānjiàn", meaning: "Mấu chốt", topic: "HSK 4" },

            // HSK 5
            { hanzi: "针对", pinyin: "zhēnduì", meaning: "Châm ngòi, hướng tới", topic: "HSK 5" },
            { hanzi: "巧妙", pinyin: "qiǎomiào", meaning: "Khéo léo", topic: "HSK 5" },
            { hanzi: "核心", pinyin: "héxīn", meaning: "Cốt lõi", topic: "HSK 5" },
            { hanzi: "调整", pinyin: "tiáozhěng", meaning: "Điều chỉnh", topic: "HSK 5" },
            { hanzi: "逻辑", pinyin: "luójí", meaning: "Logic", topic: "HSK 5" },
            { hanzi: "简直", pinyin: "jiǎnzhí", meaning: "Quả là", topic: "HSK 5" },

            // HSK 6
            { hanzi: "踊跃", pinyin: "yǒngyuè", meaning: "Hăng hái", topic: "HSK 6" },
            { hanzi: "渲染", pinyin: "xuànrǎn", meaning: "Tô vẽ, làm nổi bật", topic: "HSK 6" },
            { hanzi: "颠簸", pinyin: "diānbǒ", meaning: "Chòng chành", topic: "HSK 6" },
            { hanzi: "频繁", pinyin: "pínfán", meaning: "Thường xuyên", topic: "HSK 6" },
            { hanzi: "枯燥", pinyin: "kūzào", meaning: "Khô khan", topic: "HSK 6" },
            { hanzi: "尴尬", pinyin: "gāngà", meaning: "Ngượng ngùng", topic: "HSK 6" }
        ].map((w, idx) => ({ ...w, id: Date.now() + idx }));

        let words = JSON.parse(localStorage.getItem('tr_master_mega_words')) || DEFAULT_LIBRARY;
        let currentCardIndex = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function switchTab(tab) {
            ['library', 'flashcard', 'add'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 py-3 px-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 text-gray-500 hover:bg-gray-50";
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 py-3 px-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 bg-red-500 text-white shadow-md";
            
            if (tab === 'flashcard') {
                currentCardIndex = 0;
                updateFlashcard();
            }
            lucide.createIcons();
        }

        function renderLibrary() {
            const filter = document.getElementById('filter-topic').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('words-list');
            
            const filtered = words.filter(w => 
                (filter === 'All' || w.topic === filter) &&
                (w.hanzi.toLowerCase().includes(search) || w.meaning.toLowerCase().includes(search) || w.pinyin.toLowerCase().includes(search))
            );

            list.innerHTML = filtered.map(w => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between group transition-all hover:shadow-md">
                    <div class="flex-1">
                        <span class="inline-block px-2 py-0.5 bg-red-50 text-red-500 text-[9px] font-bold rounded-md mb-2">${w.topic}</span>
                        <h3 class="text-3xl font-bold text-gray-800 leading-tight">${w.hanzi}</h3>
                        <p class="text-red-500 text-sm italic font-medium">${w.pinyin}</p>
                        <p class="text-gray-500 mt-2 font-medium text-sm">${w.meaning}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="speak('${w.hanzi}')" class="speak-btn w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </button>
                        <button onclick="deleteWord(${w.id})" class="w-12 h-12 flex items-center justify-center text-gray-300 hover:text-red-500 transition-all no-print">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filteredWordsForFlashcard() {
            const filter = document.getElementById('filter-topic').value;
            return words.filter(w => filter === 'All' || w.topic === filter);
        }

        function updateFlashcard() {
            const filtered = filteredWordsForFlashcard();
            const container = document.getElementById('flashcard-container');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-gray-400 font-bold py-20 uppercase tracking-widest">Không có từ vựng nào!</div>';
                return;
            }

            const word = filtered[currentCardIndex];
            document.getElementById('fc-hanzi').innerText = word.hanzi;
            document.getElementById('fc-pinyin').innerText = word.pinyin;
            document.getElementById('fc-meaning').innerText = word.meaning;
            document.getElementById('fc-topic').innerText = word.topic;
            document.getElementById('fc-counter').innerText = `${currentCardIndex + 1} / ${filtered.length}`;
            document.querySelector('.card-inner').classList.remove('is-flipped');
        }

        function nextCard() {
            const filtered = filteredWordsForFlashcard();
            if (currentCardIndex < filtered.length - 1) {
                currentCardIndex++;
                updateFlashcard();
            }
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                updateFlashcard();
            }
        }

        function handleSpeakFromFlashcard() {
            const word = filteredWordsForFlashcard()[currentCardIndex];
            if (word) speak(word.hanzi);
        }

        async function translateWord() {
            const hanzi = document.getElementById('input-hanzi').value;
            if (!hanzi) return;
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(hanzi)}&langpair=zh-CN|vi`);
                const data = await res.json();
                document.getElementById('input-meaning').value = data.responseData.translatedText;
            } catch (e) { console.error(e); }
        }

        function addWord() {
            const hanzi = document.getElementById('input-hanzi').value;
            const pinyin = document.getElementById('input-pinyin').value;
            const meaning = document.getElementById('input-meaning').value;
            const topic = document.getElementById('input-topic').value;

            if (!hanzi || !meaning) return;

            const newWord = { id: Date.now(), hanzi, pinyin, meaning, topic };
            words.unshift(newWord);
            saveData();
            
            document.getElementById('input-hanzi').value = '';
            document.getElementById('input-pinyin').value = '';
            document.getElementById('input-meaning').value = '';
            
            switchTab('library');
            renderLibrary();
        }

        function deleteWord(id) {
            words = words.filter(w => w.id !== id);
            saveData();
            renderLibrary();
        }

        function resetToDefault() {
            if(confirm("Xác nhận xóa hết dữ liệu cá nhân và quay về kho từ vựng 240+ từ mặc định?")) {
                words = [...DEFAULT_LIBRARY];
                saveData();
                renderLibrary();
                switchTab('library');
            }
        }

        function saveData() {
            localStorage.setItem('tr_master_mega_words', JSON.stringify(words));
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `thuy-dung-master-mega-backup.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const imported = JSON.parse(event.target.result);
                words = [...imported, ...words];
                saveData();
                renderLibrary();
                alert('Đã nhập dữ liệu thành công!');
            };
            reader.readAsText(file);
        }

        window.onload = () => {
            lucide.createIcons();
            switchTab('library');
            renderLibrary();
            window.addEventListener('touchstart', function() {
                const dummy = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(dummy);
            }, { once: true });
        };
    </script>
</body>
</html>
